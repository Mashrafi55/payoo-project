<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-[#f4f5f7] h-[100vh] flex flex-col justify-center items-center outfit-font"
  >
    <div
      class="h-[130px] w-[300px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center"
    >
      <img src="assets/Group.png" alt="" />
    </div>
    <form class="bg-white rounded-3xl p-8 w-[350px] h-[317px]">
      <div>
        <label for="" class="font-medium">Mobile Number</label>
        <br />
        <input
          type="text"
          placeholder="Enter your number here - 12345678910"
          id="mobile-number"
          class="input bg-[#f4f5f7] mt-3 rounded-4xl font-light"
        />
      </div>

      <div class="mt-4">
        <label for="" class="font-medium">4 Digit Pin</label>
        <br />
        <input
          type="text"
          placeholder="Enter 4 Digit pin - 1234"
          id="pin-number"
          class="input bg-[#f4f5f7] mt-3 rounded-4xl font-light"
        />
      </div>

      <button
        id="loginButton"
        class="btn bg-[#0874F2] rounded-4xl text-white mt-4 text-[17px] w-full"
      >
        Login
      </button>
    </form>
    <!--alert -->
    <div id="alert-container"></div>

    <!-- js script -->
    <script src="script.js"></script>
  </body>
</html>
