<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#f4f5f7] h-[100vh] outfit-font">
    <div class="max-w-lg mx-auto bg-white rounded-b-xl">
      <div
        class="min-h-[50px] flex justify-between items-center border-b-1 border-gray-300 p-4"
      >
        <div class="flex gap-3">
          <img src="assets/Group.png" class="h-[48px]" alt="" />
          <div>
            <h2 class="font-extrabold">
              $<span id="available-balance">45000</span>
            </h2>
            <p class="text-[#08080880]">Available Balance</p>
          </div>
        </div>
        <div>
          <button class="btn text-[#08080880] bg-[#08080811] font-normal">
            <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>
            Log Out
          </button>
        </div>
      </div>

      <div class="mt-8 p-3">
        <h1 class="text-2xl font-bold my-[12px]">🔥 Welcome to Payooo!</h1>
        <p class="text-[#08080880]">
          Enjoy easy and convenient financial services with us. Cashout charge
          is low and
        </p>
      </div>

      <div class="min-h-[200px] text-center grid grid-cols-3 gap-4 p-3">
        <div
          id="add-button"
          class="form-btn border-2 border-[#0808081a] p-3 rounded-xl h-[90px]"
        >
          <img src="./assets/wallet1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Add Money</h2>
        </div>
        <div
          id="cash-out-button"
          class="form-btn border-2 border-[#0808081a] p-3 rounded-xl"
        >
          <img src="./assets/send1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Cashout</h2>
        </div>
        <div
          id="transfer-button"
          class="form-btn border-2 border-[#0808081a] p-3 rounded-xl"
        >
          <img src="./assets/money1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Transfer Money</h2>
        </div>
        <div
          id="bonus-button"
          class="form-btn border-2 border-[#0808081a] p-3 rounded-xl h-[90px]"
        >
          <img src="./assets/bonus1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Get Bonus</h2>
        </div>
        <div
          id="pay-bill-button"
          class="form-btn border-2 border-[#0808081a] p-3 rounded-xl"
        >
          <img src="./assets/purse1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Pay Bill</h2>
        </div>
        <div class="form-btn border-2 border-[#0808081a] p-3 rounded-xl">
          <img src="./assets/transaction1.png" alt="" class="mx-auto" />
          <h2 class="text-[#080808b3]">Transactions</h2>
        </div>
      </div>
    </div>

    <div class="all-form-sections max-w-lg mx-auto">
      <!-- add money -->
      <div class="form" id="add-money-parent">
        <h1 class="font-semibold text-[18px] mt-[20px] mb-[16px]">Add Money</h1>
        <form action="" class="bg-white rounded-3xl p-8">
          <div class="mb-3">
            <h1 class="font-medium text-[#080808b3]">Select a bank</h1>
            <select
              id="bank"
              class="select input bg-[#f4f5f7] mt-3 rounded-3xl font-light h-[48px] w-full text-[#080808b3]"
            >
              <option disabled selected>Select bank</option>
              <option>AB Bank</option>
              <option>Jamuna Bank</option>
              <option>Islamic Bank LTD</option>
              <option>Dutch Bangla Bank</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Bank Account Number</label
            >
            <br />
            <input
              id="account-number"
              type="text"
              placeholder="Enter any 11 Digit account number"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Amount to Add</label
            >
            <br />
            <input
              id="add-amount"
              type="text"
              placeholder="Add Amount to balance"
              a
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div>
            <label for="" class="font-medium text-[#080808b3]"
              >Pin Number</label
            >
            <br />
            <input
              id="add-pin"
              type="text"
              placeholder="Enter 4 digit pin number - 1234"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>

          <button
            id="add-money-btn"
            class="btn bg-[#0874F2] rounded-4xl text-white mt-3 text-[17px] w-full h-[48px] text-xl font-semibold"
          >
            Add Money
          </button>
          <!--alert -->
          <div id="add-money-alert"></div>
        </form>
      </div>

      <!-- Cash out -->
      <div class="form" id="cash-out-parent" style="display: none">
        <h1 class="font-semibold text-[18px] mt-[20px] mb-[16px]">Cash Out</h1>
        <form action="" class="bg-white rounded-3xl p-8">
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Agent Number</label
            >
            <br />
            <input
              id="agent-number"
              type="text"
              placeholder="Enter any 11 Digit number"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]">Amount</label>
            <br />
            <input
              id="withdraw-amount"
              type="text"
              placeholder="Add Amount to withdraw"
              a
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div>
            <label for="" class="font-medium text-[#080808b3]"
              >Pin Number</label
            >
            <br />
            <input
              id="cashout-pin"
              type="text"
              placeholder="Enter 4 digit pin number - 1234"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>

          <button
            id="withdraw-btn"
            class="btn bg-[#0874F2] rounded-4xl text-white mt-3 text-[17px] w-full h-[48px] text-xl font-semibold"
          >
            Withdraw Money
          </button>
          <!--alert -->
          <div id="cashout-alert"></div>
        </form>
      </div>

      <!-- transfer money -->
      <div class="form" id="transfer-money-parent" style="display: none">
        <h1 class="font-semibold text-[18px] mt-[20px] mb-[16px]">
          Transfer Money
        </h1>
        <form action="" class="bg-white rounded-3xl p-8">
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >User Account Number</label
            >
            <br />
            <input
              id="transfer-account-number"
              type="text"
              placeholder="Enter any 11 Digit number"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]">Amount</label>
            <br />
            <input
              id="transfer-amount"
              type="text"
              placeholder="Add Amount to transfer"
              a
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div>
            <label for="" class="font-medium text-[#080808b3]"
              >Pin Number</label
            >
            <br />
            <input
              id="transfer-pin"
              type="text"
              placeholder="Enter 4 digit pin number - 1234"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>

          <button
            id="transfer-btn"
            class="btn bg-[#0874F2] rounded-4xl text-white mt-3 text-[17px] w-full h-[48px] text-xl font-semibold"
          >
            Send Now
          </button>
          <!--alert -->
          <div id="transfer-alert"></div>
        </form>
      </div>

      <!-- Get Bonus -->
      <div class="form" id="get-bonus-parent" style="display: none">
        <h1 class="font-semibold text-[18px] mt-[20px] mb-[16px]">Get Bonus</h1>
        <form action="" class="bg-white rounded-3xl p-8">
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Enter Bonus Coupon</label
            >
            <br />
            <input
              id="bonus"
              type="text"
              placeholder="Enter your coupon - any 4 digit number"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>

          <button
            id="bonus-btn"
            class="btn bg-[#0874F2] rounded-4xl text-white mt-3 text-[17px] w-full h-[48px] text-xl font-semibold"
          >
            Get Bonus
          </button>
          <!--alert -->
          <div id="bonus-alert"></div>
        </form>
      </div>

      <!-- Pay bill -->
      <div class="form" id="pay-bill-parent" style="display: none">
        <h1 class="font-semibold text-[18px] mt-[20px] mb-[16px]">Pay bill</h1>
        <form action="" class="bg-white rounded-3xl p-8">
          <div class="mb-3">
            <h1 class="font-medium text-[#080808b3]">Select To Pay</h1>
            <select
              id="bill-type"
              class="select input bg-[#f4f5f7] mt-3 rounded-3xl font-light h-[48px] w-full text-[#080808b3]"
            >
              <option disabled selected>Select bank</option>
              <option>Electricity Bill</option>
              <option>Gas Bill</option>
              <option>Water Bill</option>
              <option>Wifi Bill</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Biller Account Number</label
            >
            <br />
            <input
              id="bill-account-number"
              type="text"
              placeholder="Enter any 11 Digit account number"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div class="mb-3">
            <label for="" class="font-medium text-[#080808b3]"
              >Amount to Pay</label
            >
            <br />
            <input
              id="bill-amount"
              type="text"
              placeholder="Add Amount to pay"
              a
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>
          <div>
            <label for="" class="font-medium text-[#080808b3]"
              >Pin Number</label
            >
            <br />
            <input
              id="bill-pin"
              type="text"
              placeholder="Enter 4 digit pin number - 1234"
              class="input bg-[#f4f5f7] mt-2 rounded-4xl font-light h-[48px] w-full"
            />
          </div>

          <button
            id="bill-btn"
            class="btn bg-[#0874F2] rounded-4xl text-white mt-3 text-[17px] w-full h-[48px] text-xl font-semibold"
          >
            Pay Now
          </button>
          <!--alert -->
          <div id="bill-alert"></div>
        </form>
      </div>

      <!-- Tr -->
    </div>

    <script src="home.js"></script>
  </body>
</html>
